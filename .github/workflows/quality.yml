name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-contract:
    name: Offline contract
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out profile
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: profile
          persist-credentials: false

      - name: Check out Hub contract
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: estelledc/estelledc.github.io
          ref: main
          path: estelledc.github.io
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run regression tests
        working-directory: profile
        run: python -m unittest discover -s scripts -p 'test_*.py' -v

      - name: Validate profile contract
        working-directory: profile
        run: python scripts/check_profile.py
